<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Personagens - D&D Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

  <nav class="navbar navbar-expand-lg dnd-navbar">
    <div class="container">

      <a class="navbar-brand" href="index.html">
        <!-- Ícone de espadas cruzadas simples -->
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="3" y1="3" x2="21" y2="21" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
          <line x1="21" y1="3" x2="3" y2="21" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2" fill="#c9a84c"/>
        </svg>
        D&amp;D Hub
      </a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarMain"
              aria-controls="navbarMain" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="meus_personagens.html">Meus Personagens</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Campanhas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Monstruário</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>
    <div class="container mt-4">

        <!-- SEÇÃO DE ROLAR DADO -->
        <section id="dice-section" class="bg-card p-4 rounded mb-4">
            <h2 class="text-center mb-4" style="color: var(--gold);">🎲 Rolar Dado</h2>

            <div class="text-center">
                <button class="dice-button btn btn-lg mb-3">
                    🎯 Rolar D20
                </button>
                <div id="dice-result" class="fs-4 fw-bold" style="color: var(--gold); min-height: 40px;">
                    Clique no botão para rolar um dado
                </div>
            </div>
        </section>

        <!-- SEÇÃO DE PERSONAGENS (placeholder) -->
        <section id="characters-section" class="bg-card p-4 rounded">
            <h2 class="mb-4" style="color: var(--gold);">👥 Meus Personagens</h2>
            <div id="characters-list">
                <div class="empty-message text-center py-5" style="color: var(--text-muted);">
                    <p>Nenhum personagem criado ainda.</p>
                    <p>Use o formulário na página inicial para criar um novo personagem!</p>
                </div>
            </div>
        </section>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
